<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PostCommand" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0d2040" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#e8edf3" media="(prefers-color-scheme: light)" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>PostCommand</title>
    <script>
      var t = localStorage.getItem('pc-theme');
      var theme = (t === 'light' || t === 'dark') ? t : 'light';
      document.documentElement.setAttribute('data-theme', theme);
      if (!t) localStorage.setItem('pc-theme', 'light');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
